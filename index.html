<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vuelos Americanos GPS</title>

  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Type: Fraunces (title), Inter (UI), IBM Plex Mono (year labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1D1810">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vuelos GPS">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --ink: #14110F;
      --panel: #1D1810;
      --panel-line: rgba(184, 134, 59, 0.28);
      --parchment: #EFE4C9;
      --brass: #B8863B;
      --brass-bright: #D9A857;
      --stone: #8C8272;
      --amber: #C9962B;
      --amber-bright: #E8B84B;
    }

    html, body, #map {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      background: var(--ink);
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--parchment);
    }

    .leaflet-control-zoom { display: none !important; }

    .leaflet-control-attribution {
      background: rgba(20, 17, 15, 0.75) !important;
      color: var(--stone) !important;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px !important;
      border: 1px solid var(--panel-line);
    }
    .leaflet-control-attribution a { color: var(--brass) !important; }

    .title-line {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-optical-sizing: auto;
      font-weight: 500;
      font-size: 12.5px;
      color: var(--stone);
      letter-spacing: 0.01em;
      margin: 0 0 5px 2px;
    }

    /* --- Slim tab bar --- */
    .tabbar {
      background: linear-gradient(180deg, rgba(29,24,16,0.96), rgba(20,17,15,0.94));
      border: 1px solid var(--panel-line);
      border-radius: 3px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.4);
      padding: 5px;
    }

    .tab {
      font-family: 'Inter', sans-serif;
      background: transparent;
      border: 1px solid var(--panel-line);
      color: var(--parchment);
      border-radius: 2px;
      padding: 5px 10px;
      display: flex;
      align-items: baseline;
      gap: 5px;
      transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease;
      white-space: nowrap;
      cursor: pointer;
    }
    .tab:hover { border-color: var(--brass); }
    .tab .tab-label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .tab .tab-years {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--stone);
    }
    .tab.is-active {
      background: var(--brass);
      border-color: var(--brass-bright);
    }
    .tab.is-active .tab-label { color: var(--ink); }
    .tab.is-active .tab-years { color: rgba(20,17,15,0.65); }

    /* --- Catastro overlay toggle: its own row below the base-layer tabs,
       in a distinct amber shade so it visually reads as "additive layer"
       rather than another exclusive tab --- */
    .overlay-row {
      margin-top: 5px;
    }
    .overlay-toggle {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, rgba(29,24,16,0.96), rgba(20,17,15,0.94));
      border: 1px solid rgba(201, 150, 43, 0.5);
      box-shadow: 0 6px 16px rgba(0,0,0,0.4);
      color: var(--amber-bright);
      border-radius: 3px;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease;
      white-space: nowrap;
      cursor: pointer;
      width: fit-content;
    }
    .overlay-toggle:hover { border-color: var(--amber-bright); }
    .overlay-toggle .toggle-label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .overlay-toggle .toggle-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1px solid var(--amber);
      background: transparent;
      transition: background-color 150ms ease;
      flex-shrink: 0;
    }
    .overlay-toggle.is-on {
      border-color: var(--amber-bright);
      background: var(--amber);
      color: var(--ink);
    }
    .overlay-toggle.is-on .toggle-label { color: var(--ink); }
    .overlay-toggle.is-on .toggle-dot {
      background: var(--amber-bright);
    }

    /* --- Instrument-style recenter dial --- */
    .dial-btn {
      background: radial-gradient(circle at 35% 30%, var(--brass-bright), var(--brass) 70%);
      border: 1px solid rgba(0,0,0,0.35);
      box-shadow: 0 6px 18px rgba(0,0,0,0.45), inset 0 0 0 3px rgba(20,17,15,0.18);
      color: var(--ink);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    .dial-btn:active { transform: scale(0.94); }
    .dial-btn.is-idle {
      background: var(--panel);
      border: 1px solid var(--panel-line);
      color: var(--stone);
      box-shadow: 0 6px 18px rgba(0,0,0,0.45);
    }

    @media (prefers-reduced-motion: no-preference) {
      .tabbar-enter {
        animation: tabbar-in 400ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes tabbar-in {
        from { opacity: 0; transform: translateY(-6px); }
        to { opacity: 1; transform: translateY(0); }
      }
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="overflow-hidden">

  <!-- Map Container -->
  <div id="map" class="absolute inset-0 z-0"></div>

  <!-- Top UI Overlay: small title + slim tab bar -->
  <div class="absolute top-3 left-3 right-3 z-[1000] pointer-events-none">
    <p class="title-line">... Donde está el terreno de abuelo?</p>
    <div class="tabbar tabbar-enter pointer-events-auto inline-flex gap-1.5 overflow-x-auto no-scrollbar max-w-full">
      <button onclick="setLayer('serieB')" id="btn-serieB" class="tab is-active">
        <span class="tab-label">Serie B</span>
        <span class="tab-years">1956–57</span>
      </button>
      <button onclick="setLayer('pnoa2004')" id="btn-pnoa2004" class="tab">
        <span class="tab-label">PNOA</span>
        <span class="tab-years">2004</span>
      </button>
      <button onclick="setLayer('modern')" id="btn-modern" class="tab">
        <span class="tab-label">Satellite</span>
        <span class="tab-years">Today</span>
      </button>
    </div>

    <!-- Catastro parcel boundary overlay — independent toggle on its own
         row, stacks on top of whichever base layer above is active -->
    <div class="overlay-row pointer-events-auto">
      <button onclick="toggleCatastro()" id="btn-catastro" class="overlay-toggle">
        <span class="toggle-dot"></span>
        <span class="toggle-label">Catastro</span>
      </button>
    </div>
  </div>

  <!-- Bottom Floating Action Button: GPS Recenter -->
  <button id="recenter-btn" onclick="recenterMap()" class="dial-btn absolute bottom-6 right-6 z-[1000] p-4 rounded-full">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
    </svg>
  </button>

  <script>
    // Initialize Map centered on Madrid (Puerta del Sol)
    const map = L.map('map', {
      zoomControl: false,
      maxZoom: 20
    }).setView([40.416775, -3.703790], 15);

    // --- WMS Historical Layers ---
    // These historical layers on ign.es/wms/pnoa-historico only support
    // their native CRS (EPSG:4258 / geographic coordinates), not Web
    // Mercator (EPSG:3857), which is what Leaflet requests by default.
    // Setting `crs: L.CRS.EPSG4326` and `version: '1.1.1'` forces Leaflet
    // to request tiles in a CRS the server actually supports for these
    // older mosaics. Without this, tiles silently come back blank/grey.

    const wmsCommonOptions = {
      format: 'image/jpeg',
      transparent: false,
      version: '1.1.1',
      crs: L.CRS.EPSG4326,
      maxZoom: 20,
      attribution: '© Instituto Geográfico Nacional (IGN)'
    };

    // Serie B: US Army Map Service flight, 1956-1957.
    // Confirmed valid layer name via GetCapabilities.
    const serieB = L.tileLayer.wms('https://www.ign.es/wms/pnoa-historico', {
      ...wmsCommonOptions,
      layers: 'AMS_1956-1957'
    });

    // NOTE: "Serie A" (1945-46) has NO national WMS mosaic layer on this
    // service — it only exists as individually browsable frames in IGN's
    // Fototeca digital viewer (https://fototeca.cnig.es/), not as a
    // stitched orthophoto. "Nacional" and "Interministerial" were both
    // tried and confirmed (via the infoVuelos query layer and direct
    // GetMap tests) to have large coverage gaps over Madrid. PNOA2004 is
    // the first year of the modern annual PNOA program and has confirmed,
    // complete national coverage.
    const pnoa2004 = L.tileLayer.wms('https://www.ign.es/wms/pnoa-historico', {
      ...wmsCommonOptions,
      layers: 'PNOA2004'
    });

    // Modern satellite/orthophoto imagery — IGN's own current PNOA
    // "máxima actualidad" service. Unlike the historical layers, this is a
    // modern INSPIRE-compliant WMS that properly supports Web Mercator
    // (EPSG:3857), so it doesn't need the CRS/version workaround.
    const modern = L.tileLayer.wms('https://www.ign.es/wms-inspire/pnoa-ma', {
      layers: 'OI.OrthoimageCoverage',
      format: 'image/jpeg',
      transparent: false,
      version: '1.3.0',
      maxZoom: 20,
      attribution: '© Instituto Geográfico Nacional (IGN) — PNOA'
    });

    // Catastro parcel boundaries — Spain's cadastral WMS, INSPIRE-compliant,
    // so it natively supports Web Mercator (no CRS workaround needed like
    // the historical IGN layers above). transparent:true + png so it draws
    // as line overlays on top of whichever base layer is active, rather
    // than replacing it. This is an ADDITIVE overlay, not a base layer —
    // it's added/removed independently via toggleCatastro(), not through
    // setLayer(). Note: this is a Spanish government server that has
    // occasionally had SSL cert chain issues reported by GIS tools; if
    // tiles fail to load, check the browser console for a tileerror.
    const catastro = L.tileLayer.wms('https://ovc.catastro.meh.es/cartografia/INSPIRE/spadgcwms.aspx', {
      layers: 'CP.CadastralParcel',
      format: 'image/png',
      transparent: true,
      version: '1.3.0',
      maxZoom: 20,
      attribution: '© Dirección General del Catastro'
    });

    // Debug helper: log the exact failing tile URL to console.
    [serieB, pnoa2004, modern, catastro].forEach(layer => {
      layer.on('tileerror', function (err) {
        console.error('WMS tile failed:', err.tile.src);
      });
    });

    // Store base layers in an object for easy switching
    const layers = { serieB, pnoa2004, modern };
    let activeLayer = 'serieB';

    // Default to Serie B (the most complete historical flight)
    serieB.addTo(map);

    // Base Layer Toggle Function
    function setLayer(layerKey) {
      map.removeLayer(layers[activeLayer]);
      layers[layerKey].addTo(map);

      const keys = Object.keys(layers);
      keys.forEach(k => {
        const btn = document.getElementById(`btn-${k}`);
        btn.classList.toggle('is-active', k === layerKey);
      });

      activeLayer = layerKey;

      // Re-add the Catastro overlay on top if it's currently toggled on,
      // since removing/re-adding the base layer can otherwise leave it
      // sitting underneath the new base tiles.
      if (catastroVisible) {
        catastro.bringToFront();
      }
    }

    // --- Catastro Overlay Toggle ---
    let catastroVisible = false;
    function toggleCatastro() {
      catastroVisible = !catastroVisible;
      const btn = document.getElementById('btn-catastro');

      if (catastroVisible) {
        catastro.addTo(map);
        catastro.bringToFront();
        btn.classList.add('is-on');
      } else {
        map.removeLayer(catastro);
        btn.classList.remove('is-on');
      }
    }

    // --- Geolocation Tracking ---
    let userMarker = null;
    let accuracyCircle = null;
    let autoCenter = true;

    // Custom brass pulsating dot for user location
    const gpsIcon = L.divIcon({
      className: 'relative flex items-center justify-center',
      html: `
        <span class="absolute inline-flex h-6 w-6 rounded-full opacity-70" style="background:#C89B4A; animation: ping 1.6s cubic-bezier(0,0,0.2,1) infinite;"></span>
        <span class="relative inline-flex rounded-full h-4 w-4 border-2" style="background:#D9A857; border-color:#14110F;"></span>
      `,
      iconSize: [24, 24],
      iconAnchor: [12, 12]
    });

    // Handle Geolocation Updates
    function onLocationFound(e) {
      const radius = e.accuracy;

      if (!userMarker) {
        userMarker = L.marker(e.latlng, { icon: gpsIcon }).addTo(map);
        accuracyCircle = L.circle(e.latlng, radius, {
          color: '#B8863B',
          fillColor: '#B8863B',
          fillOpacity: 0.12,
          weight: 1
        }).addTo(map);
      } else {
        userMarker.setLatLng(e.latlng);
        accuracyCircle.setLatLng(e.latlng).setRadius(radius);
      }

      if (autoCenter) {
        map.setView(e.latlng, map.getZoom());
      }
    }

    function onLocationError(e) {
      alert("Error finding your location: " + e.message);
    }

    map.on('locationfound', onLocationFound);
    map.on('locationerror', onLocationError);

    map.locate({
      watch: true,
      enableHighAccuracy: true
    });

    // If the user manually drags the map, stop auto-centering
    map.on('dragstart', () => {
      autoCenter = false;
      document.getElementById('recenter-btn').classList.add('is-idle');
    });

    // Manual Recenter Button Function
    function recenterMap() {
      autoCenter = true;
      document.getElementById('recenter-btn').classList.remove('is-idle');

      if (userMarker) {
        map.setView(userMarker.getLatLng(), 17);
      } else {
        map.locate({ setView: true, maxZoom: 17 });
      }
    }

    // Register service worker for offline support + installability
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
